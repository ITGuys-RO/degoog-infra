name: Build degoog-mcp image

on:
  push:
    branches: [main]
    paths:
      - 'degoog-mcp/**'
      - '.github/workflows/build-mcp.yml'
  workflow_dispatch:

concurrency:
  group: build-mcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # NOTE: was `arc-itguys-ro` (the in-cluster ARC scale set) but GitHub
    # wasn't routing jobs to it for this repo — see git history. Building a
    # small Node image + pushing to GHCR doesn't need self-hosted DinD;
    # ubuntu-latest has Docker + buildx. Switch back once org-runner routing
    # is fixed if you want to keep builds on-cluster.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/itguys-ro/degoog-mcp
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./degoog-mcp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
