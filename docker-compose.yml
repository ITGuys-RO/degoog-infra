services:
  degoog:
    image: ghcr.io/fccview/degoog:latest
    container_name: degoog
    environment:
      - DEGOOG_DEFAULT_SEARCH_LANGUAGE=ro
    volumes:
      - ./data:/app/data
    user: "1002:1002"
    ports:
      - "127.0.0.1:4444:4444"
    restart: unless-stopped
    networks:
      internal:
        ipv4_address: 172.20.0.10

  degoog-mcp:
    build: ./degoog-mcp
    container_name: degoog-mcp
    environment:
      DEGOOG_URL: http://degoog:4444
      DEGOOG_DEFAULT_LANGUAGE: ${DEGOOG_DEFAULT_LANGUAGE:-ro}
      DEGOOG_TIMEOUT_MS: ${DEGOOG_TIMEOUT_MS:-15000}
      MCP_PUBLIC_BASE_URL: ${MCP_PUBLIC_BASE_URL:-}
      MCP_OAUTH_AUTHORIZATION_SERVER: ${MCP_OAUTH_AUTHORIZATION_SERVER:-}
    depends_on:
      - degoog
    restart: unless-stopped
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - degoog-mcp
    restart: unless-stopped
    networks:
      - internal

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    volumes:
      - ./searxng-config:/etc/searxng
    depends_on:
      - valkey
    restart: unless-stopped
    networks:
      - internal

  valkey:
    image: valkey/valkey:8-alpine
    container_name: valkey
    command: valkey-server --save "" --appendonly no
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/24
