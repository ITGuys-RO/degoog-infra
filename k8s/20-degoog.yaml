apiVersion: apps/v1
kind: Deployment
metadata:
  name: degoog
  namespace: degoog
  labels:
    app.kubernetes.io/name: degoog
    app.kubernetes.io/part-of: degoog
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: degoog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: degoog
        app.kubernetes.io/part-of: degoog
    spec:
      nodeSelector:
        kubernetes.io/hostname: asus-laptop
      containers:
        - name: degoog
          image: ghcr.io/fccview/degoog:latest
          imagePullPolicy: Always
          env:
            - name: DEGOOG_DEFAULT_SEARCH_LANGUAGE
              value: ro
            - name: PUID
              value: "1002"
            - name: PGID
              value: "1002"
          ports:
            - name: http
              containerPort: 4444
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: degoog-data
---
apiVersion: v1
kind: Service
metadata:
  name: degoog
  namespace: degoog
  labels:
    app.kubernetes.io/name: degoog
    app.kubernetes.io/part-of: degoog
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: degoog
  ports:
    - name: http
      port: 4444
      targetPort: http
