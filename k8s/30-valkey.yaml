apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: degoog
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/part-of: degoog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
        app.kubernetes.io/part-of: degoog
    spec:
      nodeSelector:
        kubernetes.io/hostname: asus-laptop
      containers:
        - name: valkey
          image: valkey/valkey:9-alpine
          args:
            - valkey-server
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - name: valkey
              containerPort: 6379
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: degoog
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/part-of: degoog
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
