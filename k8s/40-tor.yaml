apiVersion: apps/v1
kind: Deployment
metadata:
  name: tor
  namespace: degoog
  labels:
    app.kubernetes.io/name: tor
    app.kubernetes.io/part-of: degoog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tor
        app.kubernetes.io/part-of: degoog
    spec:
      nodeSelector:
        kubernetes.io/hostname: asus-laptop
      containers:
        - name: tor
          image: dperson/torproxy:latest
          ports:
            - name: socks
              containerPort: 9050
            - name: control
              containerPort: 9051
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: tor
  namespace: degoog
  labels:
    app.kubernetes.io/name: tor
    app.kubernetes.io/part-of: degoog
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tor
  ports:
    - name: socks
      port: 9050
      targetPort: socks
    - name: control
      port: 9051
      targetPort: control
