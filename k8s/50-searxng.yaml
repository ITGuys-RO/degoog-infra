apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: degoog
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/part-of: degoog
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
        app.kubernetes.io/part-of: degoog
      annotations:
        # Static marker only — has no auto-restart semantics. After re-applying
        # the searxng-settings ConfigMap, run: kubectl rollout restart deploy/searxng
        config.degoog/settings-source: configmap/searxng-settings
    spec:
      # K8s auto-injects SEARXNG_PORT=tcp://<clusterIP>:8080 (Service env-var
      # convention) which the searxng entrypoint misreads as the bind port.
      # Disable the legacy service-link env vars — service discovery is via DNS.
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: asus-laptop
      containers:
        - name: searxng
          image: searxng/searxng:latest
          env:
            - name: SEARXNG_BASE_URL
              value: https://searxng.itguys.ro/
            - name: SEARXNG_PORT
              value: "8080"
            - name: SEARXNG_BIND_ADDRESS
              value: "0.0.0.0"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          volumeMounts:
            - name: settings
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
      volumes:
        - name: settings
          configMap:
            name: searxng-settings
            items:
              - key: settings.yml
                path: settings.yml
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: degoog
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/part-of: degoog
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: searxng
  ports:
    - name: http
      port: 8080
      targetPort: http
