apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: degoog
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/part-of: degoog
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
        app.kubernetes.io/part-of: degoog
      annotations:
        # Restart the pod when the ConfigMap changes. kubectl rollout restart
        # bumps this annotation automatically; we also recompute it on apply.
        config.degoog/settings-source: configmap/searxng-settings
    spec:
      nodeSelector:
        kubernetes.io/hostname: asus-laptop
      containers:
        - name: searxng
          image: searxng/searxng:latest
          env:
            - name: SEARXNG_BASE_URL
              value: https://searxng.itguys.ro/
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: settings
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
      volumes:
        - name: settings
          configMap:
            name: searxng-settings
            items:
              - key: settings.yml
                path: settings.yml
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: degoog
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/part-of: degoog
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: searxng
  ports:
    - name: http
      port: 8080
      targetPort: http
