apiVersion: apps/v1
kind: Deployment
metadata:
  name: degoog-mcp
  namespace: degoog
  labels:
    app.kubernetes.io/name: degoog-mcp
    app.kubernetes.io/part-of: degoog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: degoog-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: degoog-mcp
        app.kubernetes.io/part-of: degoog
    spec:
      nodeSelector:
        kubernetes.io/hostname: asus-laptop
      containers:
        - name: degoog-mcp
          # Image tag is updated by the build-mcp.yml workflow to ghcr.io/itguys-ro/degoog-mcp:<sha>;
          # :latest is the floating tag pointing at main's tip.
          image: ghcr.io/itguys-ro/degoog-mcp:latest
          imagePullPolicy: Always
          env:
            - name: DEGOOG_URL
              value: http://degoog:4444
            - name: DEGOOG_DEFAULT_LANGUAGE
              value: ro
            - name: DEGOOG_TIMEOUT_MS
              value: "15000"
            - name: MCP_PUBLIC_BASE_URL
              value: https://degoog-mcp.itguys.ro
            - name: MCP_OAUTH_AUTHORIZATION_SERVER
              value: https://itguys.cloudflareaccess.com
          ports:
            - name: http
              containerPort: 8765
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: degoog-mcp
  namespace: degoog
  labels:
    app.kubernetes.io/name: degoog-mcp
    app.kubernetes.io/part-of: degoog
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: degoog-mcp
  ports:
    - name: http
      port: 8765
      targetPort: http
