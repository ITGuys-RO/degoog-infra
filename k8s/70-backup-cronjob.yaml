apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-degoog
  namespace: degoog
  labels:
    app.kubernetes.io/name: backup-degoog
    app.kubernetes.io/part-of: degoog
spec:
  schedule: "0 3 * * *"
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup-degoog
            app.kubernetes.io/part-of: degoog
        spec:
          restartPolicy: OnFailure
          enableServiceLinks: false
          nodeSelector:
            kubernetes.io/hostname: asus-laptop
          containers:
            - name: tar
              image: alpine:3
              command:
                - /bin/sh
                - -euc
                - |
                  ts=$(date -u +%Y%m%dT%H%M%SZ)
                  out="/dst/degoog-${ts}.tar.gz"
                  echo "Backing up /src -> ${out}"
                  tar -czf "${out}" -C /src .
                  ls -lh "${out}"
                  echo "Pruning backups older than 14 days"
                  find /dst -name 'degoog-*.tar.gz' -mtime +14 -print -delete
              volumeMounts:
                - name: src
                  mountPath: /src
                  readOnly: true
                - name: dst
                  mountPath: /dst
          volumes:
            - name: src
              persistentVolumeClaim:
                claimName: degoog-data
                readOnly: true
            - name: dst
              persistentVolumeClaim:
                claimName: degoog-backups
